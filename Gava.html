<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GavaGroup // Arsenal</title>
    <style>
        /* --- RESET & BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        /* === DEEP BLUE / AZURE (13,68,158 based) === */
        :root {
            --accent-primary: #0d44a0;
            --accent-glow: #1e5bc9;
            --accent-cyan: #3b82f6;
            --secondary-alert: #f97316;
            --bg-deep: #030712;
            --bg-panel: rgba(10, 20, 35, 0.92);
            --border-glow: 1px solid rgba(59, 130, 246, 0.5);
            --text-dim: #b0c4de;
            --card-bg-solid: #0a1220;
        }

        body {
            background-color: var(--bg-deep);
            color: #e2e8f0;
            overflow-x: auto;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
            user-select: none;
        }

        /* --- LAYOUT UTILS --- */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .flex {
            display: flex;
            align-items: center;
        }
        .justify-between {
            justify-content: space-between;
        }
        .justify-center {
            justify-content: center;
        }
        .gap-10 {
            gap: 10px;
        }
        .gap-20 {
            gap: 20px;
        }
        .text-center {
            text-align: center;
        }
        .mt-20 {
            margin-top: 20px;
        }

        /* --- HEADER (blue infused) --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            background: rgba(3, 7, 18, 0.92);
            border-bottom: 1px solid var(--accent-cyan);
            padding: 14px 0;
            backdrop-filter: blur(12px);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
        }
        .brand {
            font-size: 1.55rem;
            font-weight: bold;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(59,130,246,0.4);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #3b82f6;
            box-shadow: 0 0 10px rgba(59,130,246,0.5);
            background: #0a1220;
        }
        .brand span {
            color: #ffffff;
        }
        
        .nav-link {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            margin-left: 24px;
            transition: 0.2s;
            font-weight: 500;
        }
        .nav-link:hover, .nav-link.active {
            color: var(--accent-cyan);
            text-shadow: 0 0 6px #3b82f6;
        }

        /* --- HERO --- */
        .hero {
            margin-top: 90px;
            padding: 40px 20px 32px;
            position: relative;
        }
        
        /* Hero section with LARGE image */
        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            padding: 20px 0;
        }
        
        /* LARGE HERO IMAGE */
        .hero-img-large {
            width: 85%;
            max-width: 700px;
            height: auto;
            border-radius: 32px;
            object-fit: cover;
            border: 3px solid #3b82f6;
            box-shadow: 0 0 40px rgba(59,130,246,0.7), 0 20px 35px -12px black;
            background: #0a1220;
            transition: transform 0.3s ease, box-shadow 0.3s;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        
        .hero-img-large:hover {
            transform: scale(1.01);
            box-shadow: 0 0 55px rgba(59,130,246,0.9);
        }
        
        .hero-text {
            text-align: center;
            width: 100%;
        }
        
        .hero-text h1 {
            font-size: 3.8rem;
            color: white;
            background: linear-gradient(135deg, #ffffff, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
        }
        
        .hero-text .subtitle-main {
            color: #60a5fa;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin: 0;
        }
        
        .hero .subtitle-below {
            color: #60a5fa;
            font-size: 1rem;
            margin-top: 15px;
            margin-bottom: 32px;
            letter-spacing: 1px;
            text-align: center;
        }
        
        /* --- GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 32px;
            padding-bottom: 70px;
        }

        /* --- CARDS : blue border & dark panel --- */
        .card {
            background: transparent;
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 20px;
            position: relative;
            transition: transform 0.25s ease, box-shadow 0.3s;
            backdrop-filter: blur(2px);
            overflow: hidden;
        }
        .card-inner {
            background: linear-gradient(145deg, #0a1220 0%, #030712 100%);
            padding: 22px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-radius: 19px;
        }
        
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px #3b82f6;
            border-color: #3b82f6;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 0.7rem;
            color: #7e8ba3;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #1f3a5f;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-dot.online {
            background: #3b82f6;
            box-shadow: 0 0 6px #3b82f6;
        }

        .preview-box {
            height: 130px;
            background: #050b14;
            border: 1px solid #1e2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            color: #4b6b9f;
            font-size: 0.75rem;
            border-radius: 14px;
            overflow: hidden;
        }
        
        .card h2 {
            color: #f0f6ff;
            font-size: 1.45rem;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .card p {
            color: #9ca8c3;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 22px;
            flex-grow: 1;
        }

        .card-footer {
            border-top: 1px solid #1e2a4a;
            padding-top: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #3b82f6;
            letter-spacing: -0.5px;
        }
        .price.free-price {
            color: #4ade80;
            text-shadow: 0 0 2px #4ade80;
        }
        
        .btn-buy {
            background: #2563eb;
            color: #ffffff;
            border: none;
            padding: 8px 22px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            border-radius: 40px;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 1px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .btn-buy:hover {
            background: #3b82f6;
            transform: scale(0.98);
            box-shadow: 0 0 12px #2563eb;
        }

        .btn-details {
            background: transparent;
            color: #7e8ba3;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            margin-right: 12px;
            transition: 0.2s;
            text-decoration: underline;
        }
        .btn-details:hover {
            color: #60a5fa;
        }

        /* --- MODAL (blue theme) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .modal {
            background: #0b1120;
            border: 1px solid #3b82f6;
            width: 640px;
            max-width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px #2563eb;
            border-radius: 24px;
            position: relative;
        }
        .modal-header {
            background: rgba(37, 99, 235, 0.2);
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e3a8a;
            border-radius: 24px 24px 0 0;
        }
        .modal-header h3 {
            color: #3b82f6;
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: 1px;
        }
        .close-icon {
            color: #b9c8ff;
            cursor: pointer;
            font-size: 1.8rem;
            line-height: 1;
            transition: 0.2s;
        }
        .close-icon:hover {
            color: white;
        }
        
        .modal-body {
            padding: 28px 30px;
        }
        .spec-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin: 24px 0;
            background: #07111f;
            padding: 18px;
            border-radius: 18px;
            border-left: 3px solid #3b82f6;
        }
        .spec-item {
            font-size: 0.9rem;
        }
        .spec-label {
            color: #6c86b0;
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .spec-val {
            color: #eef4ff;
            font-weight: 500;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin: 20px 0;
        }
        .custom-link-btn {
            background: #1e40af;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            width: 80%;
            text-align: center;
            transition: 0.2s;
            border: 1px solid #3b82f6;
        }
        .custom-link-btn:hover {
            background: #3b82f6;
            transform: scale(1.02);
            box-shadow: 0 0 12px #3b82f6;
        }

        /* responsive */
        @media (max-width: 700px) {
            .hero-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 20px;
            }
            .hero-text {
                text-align: center;
            }
            .hero-text h1 {
                font-size: 2rem;
            }
            .hero-img-large {
                width: 95%;
                max-width: 95%;
            }
            .brand {
                font-size: 1.2rem;
            }
            .brand-img {
                width: 32px;
                height: 32px;
            }
        }
        .context-hint {
            text-align: center;
            font-size: 0.7rem;
            color: #3b82f6;
            margin-top: 10px;
            opacity: 0.6;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<header>
    <div class="container flex justify-between">
        <div class="brand">
            <img class="brand-img" src="https://i.postimg.cc/13G0dtG9/IMG-4620.jpg" alt="GavaGroup Core" onerror="this.style.display='none'">
            <span>كسمك </span>
        </div>
        <nav>
            <!-- "Manifesto" button removed as requested -->
            <button class="nav-link active" onclick="app.setFilter('all')">Home</button>
            <button class="nav-link" onclick="app.openModal('contact')">About</button>
        </nav>
    </div>
</header>

<div class="container">
    <div class="hero">
        <!-- LARGE HERO IMAGE -->
        <div class="hero-content">
            <img class="hero-img-large" id="mainHeroImage" src="https://i.postimg.cc/13G0dtG9/IMG-4620.jpg" alt="GavaGroup Core Emblem - Large" onerror="this.style.display='none'">
            <div class="hero-text">
                <h1>كسمك الموقع عجبك</h1>
                <div class="subtitle-main">Delveoper عملك </div>
            </div>
        </div>
        <div class="subtitle-below"></div>
        
        <!-- ALL FILTER BUTTONS AND SEARCH BAR HAVE BEEN REMOVED -->
    </div>

    <!-- Empty product grid -->
    <div class="grid" id="product-grid">
        <div style="grid-column:1/-1; text-align:center; padding:80px 20px; background: rgba(10,18,32,0.5); border-radius: 32px; border: 1px solid #1e2a4a;">
            <div style="font-size: 2rem; margin-bottom: 16px; opacity: 0.7;">⚡</div>
            <h3 style="color: #60a5fa; margin-bottom: 12px;">CATALOG OFFLINE // NO ACTIVE MODULES</h3>
            <p style="color: #8ca3c7; max-width: 500px; margin: 0 auto;">The product list has been cleared. Right-click on the main emblem for hidden links.</p>
        </div>
    </div>
    <div class="context-hint">[ Delveoper D3f4ult ]</div>
</div>

<div id="modal-overlay" class="modal-overlay" onclick="if(event.target === this) app.closeModal()">
    <div class="modal">
        <div class="modal-header">
            <h3 id="m-title">INFO</h3>
            <span class="close-icon" onclick="app.closeModal()">×</span>
        </div>
        <div class="modal-body" id="m-body"></div>
    </div>
</div>

<script>
    // PRODUCT DATABASE COMPLETELY REMOVED (no cards/links)
    const products = [];   // empty array
    
    let currentFilter = 'all';
    let currentSearch = '';

    // --- Right-click handler: open both links in new tabs ---
    function setupRightClickOnImage() {
        const heroImg = document.getElementById('mainHeroImage');
        if (heroImg) {
            heroImg.addEventListener('contextmenu', function(event) {
                event.preventDefault();
                window.open('https://guns.lol/n8gc', '_blank');
                window.open('https://discord.gg/PN2vh2PhCk', '_blank');
                return false;
            });
        }
    }

    const app = {
        renderGrid() {
            const grid = document.getElementById('product-grid');
            if (!grid) return;
            grid.innerHTML = `
                <div style="grid-column:1/-1; text-align:center; padding:80px 20px; background: rgba(10,18,32,0.5); border-radius: 32px; border: 1px solid #1e2a4a;">
                    <div style="font-size: 2rem; margin-bottom: 16px; opacity: 0.7;">🥵</div>
                    <h3 style="color: #60a5fa; margin-bottom: 12px;">اي رايك يكسمك</h3>
                    <p style="color: #8ca3c7; max-width: 500px; margin: 0 auto;">انيك الي مينيكك ياض يخول اقفل الموقع .</p>
                </div>
            `;
        },
        
        setFilter(filter) {
            currentFilter = filter;
            this.renderGrid();
        },
        
        search(term) {
            currentSearch = term;
            this.renderGrid();
        },
        
        showProduct(id) {
            const modal = document.getElementById('modal-overlay');
            const mTitle = document.getElementById('m-title');
            const mBody = document.getElementById('m-body');
            mTitle.innerText = `// MODULE UNAVAILABLE`;
            mBody.innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <div style="font-size:3rem; margin-bottom:16px;">⚠️</div>
                    <p style="margin-bottom:16px;">This module has been removed from the catalog. No further information or download links are available.</p>
                    <button class="custom-link-btn" onclick="app.closeModal()" style="background:#1e293b; margin-top:8px;">CLOSE</button>
                </div>
            `;
            modal.style.display = 'flex';
        },
        
        openModal(type) {
            const modal = document.getElementById('modal-overlay');
            const mTitle = document.getElementById('m-title');
            const mBody = document.getElementById('m-body');
            
            // Manifesto case completely removed
            if (type === 'contact') {
                mTitle.innerText = 'About امك';
                mBody.innerHTML = `
                    <p style="margin-bottom:18px;">هتنيك هنا:</p>
                    <div class="links-container" style="gap:12px;">
                        <div class="custom-link-btn" style="background:#0f172a; cursor:default; width:auto;">✔ king: https://guns.lol/n8gc</div>
                        <div class="custom-link-btn" style="background:#0f172a; cursor:default; width:auto;">✔ xnxx: https://www.xnxx.com/</div>
                        <div class="custom-link-btn" style="background:#0f172a; cursor:default; width:auto;">✔ porn : https://www.pornhub.com/</div>
                    </div>
                    <p style="margin-top:12px; font-size:0.8rem; color:#7b98d3;">هتعجبك النكات خش يا كسمك</p>
                    <div style="margin-top:20px; padding:12px; background:#0a0f1c; border-radius:16px; border-left:3px solid #f97316;">
                        <span style="font-size:0.75rem;">استمتع يا حيحان وانيك كل اللي تقدر عليه</span>
                    </div>
                `;
            } else {
                return;
            }
            modal.style.display = 'flex';
        },
        
        closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }
    };
    
    window.app = app;
    document.addEventListener('DOMContentLoaded', () => {
        app.renderGrid();
        setupRightClickOnImage();
        
        document.body.addEventListener('contextmenu', function(e) {
            if (e.target === document.getElementById('mainHeroImage')) {
                e.preventDefault();
            }
        });
    });
</script>
</body>
</html>
